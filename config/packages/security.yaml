security:
    password_hashers:
        App\Entity\User:
            algorithm: auto

    providers:
        app_user_provider:
            entity:
                class: App\Entity\User
                property: email

    firewalls:
        dev:
            pattern: ^/(_(profiler|wdt)|css|images|js)/
            security: false

        main:
            lazy: true
            provider: app_user_provider
            # user_checker: App\Security\UserChecker
                # where to redirect after logout
                # target: app_any_route
                # where to redirect after logout
                # target: app_any_route

            form_login:
                login_path: app_login
                check_path: app_login
                enable_csrf: true
                default_target_path: app_home

            logout:
                path: app_logout

            remember_me:
                secret: '%kernel.secret%'
                lifetime: 604800 # 1 week in seconds
                path: /
                secure: true # cookie will only be set for HTTPS requests
                httponly: true # protect against XSS attacks (not accessible via JS)
                samesite: strict # csrf protection

    access_control:
        - { path: ^/connexion, roles: PUBLIC_ACCESS }
        - { path: ^/auth/encrypted-inscription, roles: PUBLIC_ACCESS }
        - { path: ^/verify/email, roles: PUBLIC_ACCESS }